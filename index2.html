<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore - FLINZY</title>

<link rel="stylesheet" href="style.css">

<link rel="icon" href="logo.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: linear-gradient(135deg, #0b1f1a, #0f3d2e);
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 35px;
  height: 35px;
  border-radius: 8px;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  opacity: 0.7;
}

nav a:hover {
  opacity: 1;
}

/* TITLE */
.title {
  text-align: center;
  padding: 40px 20px;
}

/* FILTER */
.filters {
  text-align: center;
  margin-bottom: 20px;
}

.filters button {
  margin: 5px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #00ffb3;
  color: black;
}

.filters button.active {
  background: #00d69a;
}

/* GRID */
.container {
  padding: 20px 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  border-radius: 15px;
}

.card img {
  width: 100%;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.1);
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  opacity: 0;
  transition: 0.3s;
}

.card:hover .overlay {
  opacity: 1;
}

/* ANIMATION */
.fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: 0.5s;
}

.fade-up.show {
  opacity: 1;
  transform: translateY(0);
}


</style>
</head>

<body>

<nav>
  <div class="logo">
    <img src="logo.png" alt="FLINZY logo">
    <h1>FLINZY</h1>
  </div>

  <div>
    <a href="index.html">Home</a>
    <a href="index2.html">Explore</a>
    <a href="index3.html">Chat</a>
  </div>
</nav>

<section class="title fade-up">
  <h2>Explore Designs</h2>
  <p>All works by CEO</p>
</section>

<!-- FILTER -->
<div class="filters fade-up">
  <button onclick="filter('all')" class="active">All</button>
  <button onclick="filter('Preview')" class="review">Preview</button>
  <button onclick="filter('Banner')">Banner</button>
  <button onclick="filter('Avatar')" class="vatar">Avatar</button>
</div>

<!-- GRID -->
<section class="container"></section>

<script>

/* JSON LOAD */
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    const container = document.querySelector('.container');

    data.slice().reverse().forEach(item => {
      container.innerHTML += `
        <div class="card fade-up ${item.title}">
          <img src="${item.img}" alt="${item.title}">
          <div class="overlay">${item.title}</div>
        </div>
      `;
    });

    show();
  });

/* FILTER */
function filter(type) {
  const cards = document.querySelectorAll('.card');
  const buttons = document.querySelectorAll('.filters button');

  buttons.forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');

  cards.forEach(card => {
    if (type === 'all') {
      card.style.display = 'block';
    } else {
      card.style.display = card.classList.contains(type) ? 'block' : 'none';
    }
  });
}

/* SCROLL */
function show() {
  const els = document.querySelectorAll('.fade-up');
  const trigger = window.innerHeight * 0.85;

  els.forEach(el => {
    if (el.getBoundingClientRect().top < trigger) {
      el.classList.add('show');
    }
  });
}

window.addEventListener('scroll', show);

</script>

</body>
</html>
