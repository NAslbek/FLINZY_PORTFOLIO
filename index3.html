<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat - FLINZY</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #0f2e2a, #1a4a46);
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  opacity: 0.7;
}

nav a:hover {
  opacity: 1;
}

/* CONTAINER */
.wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 80vh;
}

/* FORM BOX */
.form-box {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 15px;
  width: 350px;
  backdrop-filter: blur(10px);
}

.form-box h2 {
  margin-bottom: 15px;
}

/* INPUT */
.form-box input,
.form-box select,
.form-box textarea {
  width: 100%;
  margin-bottom: 15px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  outline: none;
}

/* BUTTON */
.form-box button {
  width: 100%;
  padding: 12px;
  border: none;
  background: #00f0ff;
  color: black;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.form-box button:hover {
  background: #4dffff;
}

/* ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: 0.6s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<nav>
  <h2>FLINZY</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="index2.html">Explore</a>
    <a href="index3.html">Chat</a>
  </div>
</nav>

<div class="wrapper">
  <div class="form-box fade">
    <h2>Start Project</h2>

    <input type="text" id="name" placeholder="Your name">
    
    <select id="type">
      <option>Preview Design</option>
      <option>Banner</option>
      <option>Avatar</option>
      <option>Full Pack</option>
    </select>

    <textarea id="message" rows="4" placeholder="Describe your idea..."></textarea>

    <button onclick="sendToTelegram()">Send Request</button>
  </div>
</div>

<script>

/* ANIMATION */
setTimeout(() => {
  document.querySelector('.fade').classList.add('show');
}, 200);

/* TELEGRAM SEND */
function sendToTelegram() {
  const name = document.getElementById('name').value;
  const type = document.getElementById('type').value;
  const message = document.getElementById('message').value;

  if (!name || !message) {
    alert("Please fill all fields!");
    return;
  }

  const text = `New Order:%0AName: ${name}%0AType: ${type}%0AMessage: ${message}`;
  
  const telegramUsername = "sadullayevv14"; // <-- shu joyni ozgartir
  
  const url = `https://t.me/${telegramUsername}?text=${text}`;
  
  window.open(url, '_blank');
}

</script>

</body>
</html>
