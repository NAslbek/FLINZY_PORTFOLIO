<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLINZY DESIGN — Premium visuals for content creators</title>

<link rel="icon" type="image/png" href="logo1.png">

<link rel="stylesheet" href="style.css">

<meta name="description" content="FLINZY DESIGN creates high-quality previews, banners, avatars and social media visuals.">
<meta name="author" content="FLINZY DESIGN">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #0b1f1a, #0f3d2e);
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 35px;
  height: 35px;
  border-radius: 8px;
}

.logo h1 {
  font-size: 20px;
  letter-spacing: 2px;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  opacity: 0.7;
}

nav a:hover {
  opacity: 1;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h2 {
  font-size: 36px;
}

.hero p {
  opacity: 0.7;
  margin-top: 10px;
}

/* GRID */
.container {
  padding: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  border-radius: 15px;
}

.card img {
  width: 100%;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.1);
}

/* ========== RASM O'LCHAMLARI ========== */
/* Banner va boshqalar uchun - standart */
.card-img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

/* Avatar uchun - 1x1 kvadrat */
.avatar-img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
}

/* Preview uchun - 16x9 */
.preview-img {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  opacity: 0;
  transition: 0.3s;
}

.card:hover .overlay {
  opacity: 1;
}

/* BUTTON */
.more-btn {
  text-align: center;
  margin: 40px;
}

.more-btn button {
  padding: 12px 28px;
  border: none;
  background: #00ffb3;
  color: black;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.more-btn button:hover {
  background: #00d69a;
}

/* ANIMATION */
.fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: 0.6s;
}

.fade-up.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">
    <img src="logo.png" alt="FLINZY logo">
    <h1>FLINZY</h1>
  </div>

  <div>
    <a href="index1.html">Home</a>
    <a href="index2.html">Explore</a>
    <a href="index3.html">Chat</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero fade-up">
  <h2>We create emotions worth sharing</h2>
  <p>Premium visuals for content creators</p>
</section>

<!-- GRID -->
<section class="container"></section>

<!-- BUTTON -->
<div class="more-btn">
  <button onclick="goExplore()">See More</button>
</div>

<script>

/* JSON LOAD */
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const container = document.querySelector('.container');

    // Oxirgi 8 ta rasm (eng yangilari)
    const latest = data.slice(-8);

    latest.forEach(item => {
      // Rasm klassini type bo'yicha belgilash
      let imgClass = 'card-img';
      if (item.type === 'Avatar') imgClass = 'avatar-img';
      if (item.type === 'Preview') imgClass = 'preview-img';
      
      container.innerHTML += `
        <div class="card fade-up">
          <img src="${item.img}" alt="${item.title}" class="${imgClass}">
          <div class="overlay">${item.title}</div>
        </div>
      `;
    });

    showOnScroll();
  });

/* SCROLL ANIMATION */
function showOnScroll() {
  const elements = document.querySelectorAll('.fade-up');
  const trigger = window.innerHeight * 0.85;

  elements.forEach(el => {
    if (el.getBoundingClientRect().top < trigger) {
      el.classList.add('show');
    }
  });
}

window.addEventListener('scroll', showOnScroll);

/* BUTTON */
function goExplore() {
  window.location.href = "index2.html";
}

</script>

</body>
</html>
