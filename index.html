<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLINZY DESIGN</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

nav h1 {
  font-size: 20px;
  letter-spacing: 2px;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  opacity: 0.7;
}

nav a:hover {
  opacity: 1;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h2 {
  font-size: 36px;
}

.hero p {
  opacity: 0.7;
  margin-top: 10px;
}

/* GRID */
.container {
  padding: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  border-radius: 15px;
  cursor: pointer;
}

.card img {
  width: 100%;
  display: block;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.1);
}

/* OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  opacity: 0;
  transition: 0.4s;
}

.card:hover .overlay {
  opacity: 1;
}

/* BUTTON */
.more-btn {
  text-align: center;
  margin: 40px;
}

.more-btn button {
  padding: 10px 25px;
  border: none;
  background: #6c63ff;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.more-btn button:hover {
  background: #8a84ff;
}

/* ANIMATION */
.fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: 0.6s;
}

.fade-up.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h1>FLINZY</h1>
  <div>
    <a href="index.html">Home</a>
    <a href="index2.html">Explore</a>
    <a href="index3.html">Chat</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero fade-up">
  <h2>We create emotions worth sharing</h2>
  <p>Premium visuals for content creators</p>
</section>

<!-- GRID -->
<section class="container">

  <!-- 8 POSTS -->
  <div class="card fade-up">
    <img src="https://picsum.photos/400/500?1">
    <div class="overlay">Preview Design</div>
  </div>

  <div class="card fade-up">
    <img src="https://picsum.photos/400/500?2">
    <div class="overlay">Banner</div>
  </div>

  <div class="card fade-up">
    <img src="https://picsum.photos/400/500?3">
    <div class="overlay">Avatar</div>
  </div>

  <div class="card fade-up">
    <img src="https://picsum.photos/400/500?4">
    <div class="overlay">Thumbnail</div>
  </div>

  <div class="card fade-up">
    <img src="https://picsum.photos/400/500?5">
    <div class="overlay">YouTube Pack</div>
  </div>

  <div class="card fade-up">
    <img src="https://picsum.photos/400/500?6">
    <div class="overlay">Social Design</div>
  </div>

  <div class="card fade-up">
    <img src="https://picsum.photos/400/500?7">
    <div class="overlay">Gaming Banner</div>
  </div>

  <div class="card fade-up">
    <img src="https://picsum.photos/400/500?8">
    <div class="overlay">Cover Art</div>
  </div>

</section>

<!-- BUTTON -->
<div class="more-btn">
  <button onclick="goExplore()">See More</button>
</div>

<script>

/* SCROLL ANIMATION */
const elements = document.querySelectorAll('.fade-up');

function showOnScroll() {
  const trigger = window.innerHeight * 0.85;

  elements.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < trigger) {
      el.classList.add('show');
    }
  });
}

window.addEventListener('scroll', showOnScroll);
showOnScroll();

/* BUTTON ACTION */
function goExplore() {
  alert("Explore page hali tayyor emas 😄");
}

</script>

</body>
</html>
